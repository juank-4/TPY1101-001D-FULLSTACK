# ===============================
# CONFIGURACIÓN DE MYSQL
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/mi_base_de_datos?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# CONFIGURACIÓN DE HIBERNATE / JPA
# ===============================
# create-drop: borra y crea la BD cada vez que inicias (útil en desarrollo)
# update: actualiza el esquema sin borrar datos (recomendado ahora)
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# CONFIGURACIÓN DEL PUERTOoo
# ===============================
server.port=8080